<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project: Ethereal - Main Menu</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>
    <div id="particle-container"></div>

    <div class="game-background"></div>

    <div class="menu-container">
        <div class="game-title">
            <h1 class="title-main">ETHEREAL</h1>
            <p class="title-sub">ECHOES OF THE FALLEN</p>
        </div>

        <nav class="menu-options">
            <button class="menu-btn" data-action="new-game">
                <span class="btn-text">Awaken (New Game)</span>
                <div class="btn-glare"></div>
            </button>
            <button class="menu-btn" data-action="load-game">
                <span class="btn-text">Memories (Load)</span>
                <div class="btn-glare"></div>
            </button>
            <button class="menu-btn" data-action="settings">
                <span class="btn-text">Resonance (Settings)</span>
                <div class="btn-glare"></div>
            </button>
            <button class="menu-btn" data-action="extra-modes" style="display: none;">
                <span class="btn-text">Realms (Extras)</span>
                <div class="btn-glare"></div>
            </button>
            <button class="menu-btn" data-action="quit">
                <span class="btn-text">Slumber (Quit)</span>
                <div class="btn-glare"></div>
            </button>
        </nav>
        
        <div class="version-info">v0.0.1 Alpha - WebGL Engine Ready</div>
    </div>

    <div id="loading-screen" class="hidden">
        <div class="loading-content">
            <div class="loading-icon"></div>
            <div class="loading-text">Synchronizing World Data...</div>
            <div class="progress-bar-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
            <div class="progress-percentage" id="progress-text">0%</div>
        </div>
    </div>

    <div id="game-world" class="hidden-world">
        <div class="layer sky"></div>
        <div class="layer mountains-back"></div>
        <div class="layer mountains-front"></div>
        <div class="ground" id="walkable-ground"></div>
        
        <div id="player">
            <div class="player-sprite" id="player-visual">
                <div class="player-core"></div>
                <div class="player-trail"></div>
                
                <div class="sword-slash" id="sword-slash"></div>
            </div>
        </div>

        <div class="enemy" id="enemy-1">
            <div class="enemy-core"></div>
            <div class="enemy-hp-bar"><div class="enemy-hp-fill" id="enemy-hp-fill"></div></div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
